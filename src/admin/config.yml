backend:
  name: github
  repo: FelipeMAffonso/felipemaffonso.com
  branch: main

media_folder: "src/images"
public_folder: "/images"

collections:
  - name: "data"
    label: "Site Data"
    files:
      - name: "site"
        label: "Site Info"
        file: "src/_data/site.json"
        fields:
          - { label: "Name", name: "title", widget: "string" }
          - { label: "Role", name: "role", widget: "string" }
          - { label: "Institution", name: "institution", widget: "string" }
          - { label: "Department", name: "department", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Office", name: "office", widget: "string" }
          - { label: "CV URL", name: "cv_url", widget: "string" }
          - label: "Social Links"
            name: "social"
            widget: "object"
            fields:
              - { label: "Google Scholar", name: "scholar", widget: "string" }
              - { label: "GitHub", name: "github", widget: "string" }
              - { label: "OSF", name: "osf", widget: "string" }
              - { label: "LinkedIn", name: "linkedin", widget: "string" }
              - { label: "Twitter/X", name: "twitter", widget: "string" }

      - name: "publications"
        label: "Publications"
        file: "src/_data/publications.json"
        fields:
          - label: "Preprints"
            name: "preprints"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Authors", name: "authors", widget: "string" }
              - { label: "Platform", name: "platform", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Forthcoming"
            name: "forthcoming"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Authors", name: "authors", widget: "string" }
              - { label: "Journal", name: "journal", widget: "string" }
              - { label: "DOI", name: "doi", widget: "string", required: false }
              - { label: "Note", name: "note", widget: "string", required: false }
          - label: "Published"
            name: "published"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Authors", name: "authors", widget: "string" }
              - { label: "Journal", name: "journal", widget: "string" }
              - { label: "Year", name: "year", widget: "number" }
              - { label: "Volume", name: "volume", widget: "string", required: false }
              - { label: "DOI", name: "doi", widget: "string", required: false }
              - { label: "Note", name: "note", widget: "string", required: false }

      - name: "courses"
        label: "Teaching"
        file: "src/_data/courses.json"
        fields:
          - { label: "Teaching Interests", name: "interests", widget: "string" }
          - label: "Awards"
            name: "awards"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Year", name: "year", widget: "number" }
          - label: "Current Courses"
            name: "current"
            widget: "list"
            fields:
              - { label: "Course Name", name: "name", widget: "string" }
              - { label: "Level", name: "level", widget: "string" }
              - { label: "Institution", name: "institution", widget: "string" }
              - { label: "Semesters", name: "semesters", widget: "list", field: { label: "Semester", name: "semester", widget: "string" } }
          - label: "Previous Courses"
            name: "previous"
            widget: "list"
            fields:
              - { label: "Course Name", name: "name", widget: "string" }
              - { label: "Level", name: "level", widget: "string" }
              - { label: "Institution", name: "institution", widget: "string" }
              - { label: "Note", name: "note", widget: "string", required: false }
              - { label: "Semesters", name: "semesters", widget: "list", field: { label: "Semester", name: "semester", widget: "string" } }
